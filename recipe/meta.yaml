{% set name = "ansys-api-platform-instancemanagement" %}
{% set version = "1.1.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ansys_api_platform_instancemanagement-{{ version }}.tar.gz
  sha256: 4a133c45951414842c126adc30f0c86b43ca117acebc4d436958c778350c7fe6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42.0.0
    - wheel
    - ansys_tools_protoc_helper
    - pip
  run:
    - python >={{ python_min }}
    - grpcio >=1.17,<2.dev0
    - protobuf >=3.19

test:
  imports:
    - ansys.api.platform.instancemanagement
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ansys/ansys-api-platform-instancemanagement
  summary: Autogenerated python gRPC interface package for ansys-api-platform-instancemanagement
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - RobPasMue
    - jorgepiloto
    - SMoraisAnsys
    - MaxJPRey
